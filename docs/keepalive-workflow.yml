name: Keepalive mensal

# O GitHub desativa workflows agendados após 60 dias sem atividade no
# repositório. Este workflow faz um commit pequeno todo mês para manter
# o lembrete horário vivo indefinidamente.

on:
  schedule:
    - cron: "17 12 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Commit de atividade
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive
          git commit -m "chore: keepalive mensal"
          git push
