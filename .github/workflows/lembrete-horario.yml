name: Lembrete horário

on:
  schedule:
    # 8h-23h UTC = 5h-20h em horário de Brasília (UTC-3)
    - cron: "5 8-23 * * *"
  workflow_dispatch: {}

concurrency:
  group: lembrete-horario
  cancel-in-progress: false

jobs:
  enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/validate-content.mjs
      - run: node scripts/send-lembrete.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
